# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json
specVersion: "3.0"
metadata:
  name: sap.fe.cap.travel_analytics
type: application

resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8

builder:
  componentPreload:
    excludes:
      - "sap/fe/cap/travel_analytics/manifest.json"
  resources:
    excludes:
      - "/test/**"
      - "/localService/**"
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: travel-analytics
        additionalFiles:
          - xs-app.json
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion

server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://sapui5.hana.ondemand.com
        backend:
        - path: /odata
          url: http://localhost:4004/odata
        - path: /analytics
          url: http://localhost:4004/analytics
    - name: fiori-tools-appreload
      afterMiddleware: compression
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          enhancedHomePage: true
    - name: ui5-tooling-transpile-middleware
      afterMiddleware: compression
      configuration:
        excludePatterns:
          - /Component-preload.js
