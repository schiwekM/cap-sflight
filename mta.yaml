_schema-version: "3.2"
ID: capire.sflight
version: 1.0.0
description: "CAP sflight demo"

parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

build-parameters:
  before-all:
    - builder: custom
      commands:
        # set 'CDS_ENV=node' to pick the 'node' build profile settings, defined in package.json
        - npm ci
        - npx -p @sap/cds-dk cds build --profile production,node
        - mkdir gen/app
        - cp app/cdm.json gen/app/cdm.json
        #- cp -R patches gen/srv/

modules:
  # --------------------- SERVER MODULE ------------------------
  - name: sflight-srv
    # ------------------------------------------------------------
    type: nodejs
    path: gen/srv
    requires:
      - name: sflight-db
      - name: sflight-uaa
      - name: sflight-cloud-logging
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter, destinations)
        properties:
          srv-url: ${default-url}
    build-parameters:
      builder: npm-ci
      ignore:
        - "node_modules/"

  # -------------------- SIDECAR MODULE ------------------------
  - name: sflight-db-deployer
    # ------------------------------------------------------------
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: sflight-db
      - name: sflight-uaa
      - name: sflight-cloud-logging
    build-parameters:
      ignore:
        - "node_modules/"

  # ------------------ APPLICATION CONTENT ---------------------
  - name: sflight-appcontent
    # ------------------------------------------------------------
    type: com.sap.application.content
    path: gen
    requires:
      - name: srv-api
      - name: sflight-uaa
      - name: sflight-html5-repo-host
        parameters:
          content-target: true
    parameters:
      config:
        destinations:
          - forwardAuthToken: true
            name: sflight-srv
            url: ~{srv-api/srv-url}
          - name: ui5
            url: https://ui5.sap.com
    build-parameters:
      build-result: app/
      requires:
        - name: sflight-app-travel-processor
          artifacts:
            - travel-processor.zip
          target-path: app/
        - name: sflight-app-travel-analytics
          artifacts:
            - travel-analytics.zip
          target-path: app/

  # ------------- APPLICATION: TRAVEL PROCESSOR ----------------
  - name: sflight-app-travel-processor
    # ------------------------------------------------------------
    type: html5
    path: app/travel_processor
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm run build
      supported-platforms:
        []

  # ------------- APPLICATION: TRAVEL ANALYTICS ----------------
  - name: sflight-app-travel-analytics
    # ------------------------------------------------------------
    type: html5
    path: app/travel_analytics
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm run build
      supported-platforms:
        []

  # ------------------ DESTINATION CONTENT ---------------------
  - name: sflight-destinationcontent
    # ------------------------------------------------------------
    type: com.sap.application.content
    build-parameters:
      no-source: true
    requires:
      - name: srv-api
      - name: sflight-uaa
        parameters:
          service-key:
            name: sflight-uaa-key
      - name: sflight-html5-repo-runtime
        parameters:
          service-key:
            name: sflight-html5-repo-runtime-key
      - name: sflight-destination-service
        parameters:
          content-target: true
    parameters:
      content:
        subaccount:
          existing_destinations_policy: update
          destinations:
            - Authentication: OAuth2UserTokenExchange
              HTML5.DynamicDestination: true
              Name: sflight-srv
              TokenServiceInstanceName: sflight-uaa
              TokenServiceKeyName: sflight-uaa-key
              URL: ~{srv-api/srv-url}
              sap.cloud.service: sap.fe.cap.sflight
            - Name: sflight-cdm
              ServiceInstanceName: sflight-html5-repo-runtime
              ServiceKeyName: sflight-html5-repo-runtime-key
              URL: https://html5-apps-repo-rt.cfapps.eu12.hana.ondemand.com/applications/cdm/sap.fe.cap.sflight

  - name: sflight
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: sflight-uaa
      - name: sflight-cloud-logging
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

resources:
  # ------------------------------------------------------------
  - name: sflight-db
    # ------------------------------------------------------------
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
    properties:
      hdi-service-name: ${service-name}

  # ------------------------------------------------------------
  - name: sflight-uaa
    # ------------------------------------------------------------
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: sflight-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          redirect-uris:
            - https://~{app-api/app-uri}/**
    requires:
      - name: app-api

  # ------------------------------------------------------------
  - name: sflight-html5-repo-runtime
    # ------------------------------------------------------------
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  # ------------------------------------------------------------
  - name: sflight-html5-repo-host
    # ------------------------------------------------------------
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  # ------------------------------------------------------------
  - name: sflight-destination-service
    # ------------------------------------------------------------
    type: org.cloudfoundry.managed-service
    requires:
      - name: srv-api
    parameters:
      service: destination
      service-plan: lite
      config:
        version: 1.0.0
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                Name: sflight-srv
                URL: ~{srv-api/srv-url}
                forwardAuthToken: true
            existing_destinations_policy: update
          subaccount:
            destinations:
              - Authentication: NoAuthentication
                Name: sflight-rt
                ProxyType: Internet
                Type: HTTP
                URL: https://cdsmunich.launchpad.cfapps.eu12.hana.ondemand.com
            existing_destinations_policy: update
  - name: sflight-cloud-logging
    type: org.cloudfoundry.managed-service
    parameters:
      service: cloud-logging
      service-plan: dev
      config:
        ingest_otlp:
          enabled: true
